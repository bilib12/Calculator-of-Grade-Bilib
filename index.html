<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="min-h-screen py-12 px-4">
    <div class="max-w-lg mx-auto">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-3xl shadow-xl mb-6">
                <i class="fas fa-calculator text-4xl text-indigo-600"></i>
            </div>
            <h1 class="text-4xl font-bold text-white">Grade Calculator</h1>
            <p class="text-indigo-100 mt-2">Using Input Prompts</p>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl p-10 text-center">
            <button onclick="startCalculation()" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white text-xl font-semibold py-5 px-12 rounded-2xl transition-all active:scale-95 shadow-lg">
                <i class="fas fa-play mr-3"></i>
                Start Grade Calculation
            </button>

            <div id="result" class="hidden mt-10 text-left"></div>
        </div>

        <div class="text-center text-white/70 text-sm mt-8">
            50% Exam • 20% Performance Task • 30% Quizzes
        </div>
    </div>

    <script>
        function startCalculation() {
            // Get inputs using prompt
            let exam = parseFloat(prompt("Enter Exam score (%)"));
            let tp = parseFloat(prompt("Enter Performance Task score (%)"));
            
            let count = parseInt(prompt("How many quiz/activity scores?"));

            // Validation
            if (isNaN(exam) || isNaN(tp) || isNaN(count) || count < 1) {
                alert("Please enter valid numbers.");
                return;
            }

            let total = 0;
            for(let i = 1; i <= count; i++){
                let score = parseFloat(prompt(`Enter score ${i} (%)`));
                if (isNaN(score)) {
                    alert("Invalid score entered.");
                    return;
                }
                total += score;
            }

            let quizAvg = total / count;
            let finalGrade = (exam * 0.50) + (tp * 0.20) + (quizAvg * 0.30);

            // Display nice result
            const resultDiv = document.getElementById("result");
            resultDiv.classList.remove("hidden");
            resultDiv.innerHTML = `
                <div class="bg-gray-50 p-6 rounded-2xl space-y-4">
                    <h3 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2">
                        <i class="fas fa-chart-pie"></i> Calculation Result
                    </h3>
                    <div class="space-y-3">
                        <div class="flex justify-between text-lg">
                            <span class="text-gray-600">Exam Score:</span>
                            <span class="font-semibold">${exam.toFixed(2)}%</span>
                        </div>
                        <div class="flex justify-between text-lg">
                            <span class="text-gray-600">Performance Task:</span>
                            <span class="font-semibold">${tp.toFixed(2)}%</span>
                        </div>
                        <div class="flex justify-between text-lg">
                            <span class="text-gray-600">Quiz Average:</span>
                            <span class="font-semibold">${quizAvg.toFixed(2)}%</span>
                        </div>
                        <hr>
                        <div class="flex justify-between text-2xl font-bold pt-2">
                            <span>Final Grade:</span>
                            <span class="text-indigo-600">${finalGrade.toFixed(2)}%</span>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
