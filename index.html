<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade Calculator</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}
.card {
    transition: all 0.3s ease;
}
.card:hover {
    transform: translateY(-5px);
}
input:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(102,126,234,0.3);
}
.slash {
    font-size: 2rem;
    color: #9ca3af;
}
</style>
</head>

<body class="min-h-screen py-12 px-4">

<div class="max-w-6xl mx-auto">

<!-- HEADER -->
<div class="text-center mb-8">
    <i class="fas fa-calculator text-4xl text-white"></i>
    <h1 class="text-4xl font-bold text-white">Grade Calculator</h1>
</div>

<!-- SIDE BY SIDE CONTAINER -->
<div class="grid md:grid-cols-2 gap-6">

<!-- ================= LEFT: CLASS CALCULATOR ================= -->
<div class="bg-white rounded-3xl shadow-2xl p-8 space-y-6">

<!-- EXAM -->
<div>
<label>Exam (50%)</label>
<div class="flex gap-2">
<input id="examScore" class="w-full border p-3 rounded-xl text-center" placeholder="Score">
<span class="slash">/</span>
<input id="examMax" class="w-full border p-3 rounded-xl text-center" placeholder="Max">
</div>
</div>

<!-- PT -->
<div>
<label>Performance Task (20%)</label>
<div class="flex gap-2">
<input id="ptScore" class="w-full border p-3 rounded-xl text-center">
<span class="slash">/</span>
<input id="ptMax" class="w-full border p-3 rounded-xl text-center">
</div>
</div>

<!-- QUIZ -->
<div>
<label>Quiz (15%)</label>
<div id="quizBox" class="space-y-2"></div>
</div>

<!-- ACTIVITY -->
<div>
<label>Activity (15%)</label>
<div id="actBox" class="space-y-2"></div>
</div>

<button onclick="calculateGrade()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl">
Calculate Class Grade
</button>

<div id="result" class="hidden bg-gray-50 p-6 rounded-2xl text-center mt-4">
<p id="final" class="font-extrabold text-5xl text-indigo-700"></p>
</div>

</div>

<!-- ================= RIGHT: SEMESTER SYSTEM ================= -->
<div class="bg-white rounded-3xl shadow-2xl p-8 space-y-6">

<h2 class="text-2xl font-bold text-purple-700">🏫 Semester System</h2>

<!-- PRELIM -->
<div>
<label>Prelim (20%)</label>
<input id="prelim" class="w-full border p-3 rounded-xl text-center" placeholder="Grade">
</div>

<!-- MIDTERM -->
<div>
<label>Midterm (20%)</label>
<input id="midterm" class="w-full border p-3 rounded-xl text-center" placeholder="Grade">
</div>

<!-- PREFI -->
<div>
<label>Pre-Final (20%)</label>
<input id="prefi" class="w-full border p-3 rounded-xl text-center" placeholder="Grade">
</div>

<!-- FINALS -->
<div>
<label>Finals (40%)</label>
<input id="finals" class="w-full border p-3 rounded-xl text-center" placeholder="Grade">
</div>

<button onclick="calculateSemester()" class="w-full bg-purple-600 text-white p-4 rounded-2xl">
Calculate Semester
</button>

<div id="semResult" class="text-center font-bold text-2xl text-purple-700"></div>

</div>

</div>
</div>

<script>

// CREATE INPUTS
function create(prefix, container){
    for(let i=0;i<5;i++){
        document.getElementById(container).innerHTML += `
        <div class="flex gap-2">
            <input id="${prefix}s${i}" placeholder="Score" class="w-1/2 border p-2 rounded">
            <input id="${prefix}m${i}" placeholder="Max" class="w-1/2 border p-2 rounded">
        </div>`;
    }
}
create("q","quizBox");
create("a","actBox");

// AVG
function avg(prefix){
    let arr=[];
    for(let i=0;i<5;i++){
        let s=parseFloat(document.getElementById(prefix+"s"+i).value);
        let m=parseFloat(document.getElementById(prefix+"m"+i).value);

        if(!isNaN(s)&&!isNaN(m)&&m>0){
            arr.push((s/m)*100);
        }
    }
    return arr.length?arr.reduce((a,b)=>a+b)/arr.length:0;
}

// CLASS GRADE
function calculateGrade(){

let exam = (parseFloat(examScore.value)/parseFloat(examMax.value))*100 || 0;
let pt = (parseFloat(ptScore.value)/parseFloat(ptMax.value))*100 || 0;

let quiz = avg("q");
let act = avg("a");

let final =
exam*0.50 +
pt*0.20 +
quiz*0.15 +
act*0.15;

document.getElementById("result").classList.remove("hidden");
document.getElementById("final").innerText = final.toFixed(2) + "%";
}

// SEMESTER CALC
function calculateSemester(){

let p = parseFloat(prelim.value)||0;
let m = parseFloat(midterm.value)||0;
let pf = parseFloat(prefi.value)||0;
let f = parseFloat(finals.value)||0;

let sem =
p*0.20 +
m*0.20 +
pf*0.20 +
f*0.40;

document.getElementById("semResult").innerText =
"Semester Grade: " + sem.toFixed(2) + "%";
}

</script>

</body>
</html>
