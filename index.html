<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade Calculator</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}
.card {
    transition: all 0.3s ease;
}
.card:hover {
    transform: translateY(-5px);
}
input:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(102,126,234,0.3);
}
.slash {
    font-size: 2rem;
    color: #9ca3af;
}
</style>
</head>

<body class="min-h-screen py-12 px-4">

<div class="max-w-lg mx-auto">

<!-- HEADER -->
<div class="text-center mb-8">
    <i class="fas fa-calculator text-4xl text-white"></i>
    <h1 class="text-4xl font-bold text-white">Grade Calculator</h1>
</div>

<!-- CARD -->
<div class="bg-white rounded-3xl shadow-2xl p-8 space-y-6">

<!-- EXAM -->
<div>
<label>Exam (50%)</label>
<div class="flex gap-2">
<input id="examScore" class="w-full border p-3 rounded-xl text-center" placeholder="Score">
<span class="slash">/</span>
<input id="examMax" class="w-full border p-3 rounded-xl text-center" placeholder="Max">
</div>
</div>

<!-- PT -->
<div>
<label>Performance Task (20%)</label>
<div class="flex gap-2">
<input id="ptScore" class="w-full border p-3 rounded-xl text-center">
<span class="slash">/</span>
<input id="ptMax" class="w-full border p-3 rounded-xl text-center">
</div>
</div>

<!-- QUIZ -->
<div>
<label>Quiz (15%)</label>
<div id="quizBox" class="space-y-2"></div>
</div>

<!-- ACTIVITY -->
<div>
<label>Activity (15%)</label>
<div id="actBox" class="space-y-2"></div>
</div>

<!-- BUTTON -->
<button onclick="calculateGrade()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl">
Calculate Grade
</button>

<!-- RESULT -->
<div id="result" class="hidden bg-gray-50 p-6 rounded-2xl text-center mt-4">

<p id="final" class="font-extrabold text-5xl text-indigo-700 drop-shadow-lg"></p>

</div>

</div>
</div>

<script>

// CREATE 5 INPUTS EACH
function create(prefix, container){
    for(let i=0;i<5;i++){
        document.getElementById(container).innerHTML += `
        <div class="flex gap-2">
            <input id="${prefix}s${i}" placeholder="Score" class="w-1/2 border p-2 rounded">
            <input id="${prefix}m${i}" placeholder="Max" class="w-1/2 border p-2 rounded">
        </div>`;
    }
}
create("q","quizBox");
create("a","actBox");

// COMPUTE AVG
function avg(prefix){
    let arr=[];
    for(let i=0;i<5;i++){
        let s=parseFloat(document.getElementById(prefix+"s"+i).value);
        let m=parseFloat(document.getElementById(prefix+"m"+i).value);

        if(!isNaN(s)&&!isNaN(m)&&m>0){
            arr.push((s/m)*100);
        }
    }
    return arr.length?arr.reduce((a,b)=>a+b)/arr.length:0;
}

// MAIN
function calculateGrade(){

let exam = (parseFloat(examScore.value)/parseFloat(examMax.value))*100;
let pt = (parseFloat(ptScore.value)/parseFloat(ptMax.value))*100;

let quiz = avg("q");
let act = avg("a");

// WEIGHTS
let final =
exam*0.50 +
pt*0.20 +
quiz*0.15 +
act*0.15;

// 🔥 BOLD OUTPUT ONLY (as requested)
document.getElementById("result").classList.remove("hidden");
document.getElementById("final").innerHTML =
`
<div style="font-size:1.2rem; color:#6b7280;">Final Grade</div>
<div style="font-size:4rem; font-weight:900; color:#4f46e5;">
${final.toFixed(2)}%
</div>
`;

}

</script>

</body>
</html>
